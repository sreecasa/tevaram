<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tevaram</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
      background-color: #f9f9f9;
      color: #333;
      line-height: 1.6;
    }
    h1 {
      text-align: center;
      color: #2c3e50;
    }
    .container {
      max-width: 800px;
      margin: auto;
      background: #fff;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }
    .download {
      display: block;
      text-align: center;
      margin: 20px 0;
    }
    .download a {
      background: #3498db;
      color: #fff;
      padding: 12px 20px;
      text-decoration: none;
      border-radius: 5px;
      font-weight: bold;
    }
    .download a:hover {
      background: #2980b9;
    }
    embed {
      width: 100%;
      height: 600px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Tevaram</h1>
    <p>Welcome! You can read the ebook below or download it for offline reading.</p>
    
    <div class="download">
      <a href="tevaram.pdf" download>📥 Download Ebook</a>
    </div>
    
    <!-- Embedded PDF viewer -->
    <div style="margin:20px auto; max-width:800px;">
      <embed src="tevaram.pdf" type="application/pdf" />
    </div>
  </div>
</body>
</html>
